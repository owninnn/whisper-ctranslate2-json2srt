[project]
name = "json2lrc"
version = "0.1.0"
description = "Convert Whisper JSON to LRC with intelligent sentence segmentation"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
json2lrc = "json2lrc.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/json2lrc"]

[tool.uv]
dev-dependencies = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]
